<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yur Collection - Toko Hijab & Fashion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        :root {
            --primary-color: #d4a373; /* Warna elegan untuk fashion */
            --secondary-color: #faedcd;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fefae0;
            color: #4a4a4a;
        }

        .product-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(212, 163, 115, 0.2);
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .custom-shadow {
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }

        .gradient-bg {
            background: linear-gradient(135deg, #d4a373 0%, #a98467 100%);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 10px;
        }

        #notification-popup {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            display: none;
        }

        .line-through-price {
            text-decoration: line-through;
            color: #9ca3af;
        }
    </style>
</head>
<body class="pb-20">

    <!-- Konfigurasi Utama (Mudah di-edit) -->
    <script>
        // EDIT DATA TOKO DI SINI
        const SHOP_CONFIG = {
            name: "Yur Collection",
            whatsapp: "6281234567890", // Ganti dengan nomor WA Anda (awali 62)
            address: "Jl. Fashion No. 123, Jakarta Selatan",
            hours: "Senin - Sabtu: 09:00 - 18:00 WIB",
            logoText: "YC",
            categories: ["Semua", "Polos", "Motif", "Pashmina", "Cardenza", "Paris", "Anak", "Fashion"]
        };

        // EDIT DATA PRODUK DI SINI
        // Anda bisa menambah, menghapus, atau mengubah item ini
        const PRODUCTS = [
            {
                id: 1,
                name: "Pashmina Silk Premium",
                category: "Pashmina",
                image: "https://images.unsplash.com/photo-1618333244970-f20380316499?auto=format&fit=crop&q=80&w=400",
                price: 85000,
                discountPrice: 65000,
                sold: 1250,
                rating: 5,
                desc: "Pashmina silk berkualitas tinggi dengan kilau elegan, sangat lembut dan mudah dibentuk."
            },
            {
                id: 2,
                name: "Hijab Paris Voal Polos",
                category: "Polos",
                image: "https://images.unsplash.com/photo-1573468940833-281b37494f6c?auto=format&fit=crop&q=80&w=400",
                price: 45000,
                discountPrice: 35000,
                sold: 850,
                rating: 5,
                desc: "Bahan Voal Paris yang adem dan tegak di dahi. Cocok untuk penggunaan sehari-hari."
            },
            {
                id: 3,
                name: "Cardenza Luxury Shawl",
                category: "Cardenza",
                image: "https://images.unsplash.com/photo-1620799140408-edc6dcb6d633?auto=format&fit=crop&q=80&w=400",
                price: 120000,
                discountPrice: 95000,
                sold: 540,
                rating: 5,
                desc: "Tekstur pleated eksklusif yang memberikan kesan mewah dan bervolume."
            },
            {
                id: 4,
                name: "Hijab Anak Karakter",
                category: "Anak",
                image: "https://images.unsplash.com/photo-1518837695005-2083093ee35b?auto=format&fit=crop&q=80&w=400",
                price: 55000,
                discountPrice: 40000,
                sold: 320,
                rating: 5,
                desc: "Hijab instan untuk anak dengan bahan jersey premium yang tidak panas."
            },
            {
                id: 5,
                name: "Motif Etnik Square",
                category: "Motif",
                image: "https://images.unsplash.com/photo-1606761568499-6d2451b23c66?auto=format&fit=crop&q=80&w=400",
                price: 95000,
                discountPrice: 75000,
                sold: 210,
                rating: 5,
                desc: "Motif eksklusif Yur Collection dengan perpaduan warna bumi yang menawan."
            },
            {
                id: 6,
                name: "Tunik Fashion Modern",
                category: "Fashion",
                image: "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&q=80&w=400",
                price: 195000,
                discountPrice: 155000,
                sold: 145,
                rating: 5,
                desc: "Atasan tunik dengan potongan modern, cocok untuk acara formal maupun santai."
            }
        ];
    </script>

    <!-- Header / Logo -->
    <header class="bg-white sticky top-0 z-50 py-4 px-6 custom-shadow animate__animated animate__fadeInDown">
        <div class="flex justify-between items-center max-w-6xl mx-auto">
            <div class="flex items-center space-x-3">
                <div class="gradient-bg w-10 h-10 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg">
                    <span id="header-logo-text"></span>
                </div>
                <div>
                    <h1 class="font-bold text-xl tracking-tight text-gray-800" id="header-shop-name"></h1>
                    <p class="text-xs text-gray-500">Premium Hijab & Fashion</p>
                </div>
            </div>
            <div class="flex space-x-4">
                <button class="text-gray-600 hover:text-brown-500"><i class="fa-solid fa-magnifying-glass text-lg"></i></button>
                <button class="text-gray-600 relative"><i class="fa-solid fa-cart-shopping text-lg"></i></button>
            </div>
        </div>
    </header>

    <!-- Banner Promo -->
    <section class="p-6 max-w-6xl mx-auto animate__animated animate__fadeIn">
        <div class="gradient-bg rounded-3xl p-8 text-white relative overflow-hidden flex items-center shadow-2xl">
            <div class="relative z-10 w-2/3">
                <h2 class="text-3xl font-bold mb-2">New Collection!</h2>
                <p class="text-sm opacity-90 mb-4">Dapatkan diskon hingga 30% untuk produk Pashmina terbaru minggu ini.</p>
                <button class="bg-white text-gray-800 px-6 py-2 rounded-full font-bold text-sm hover:bg-opacity-90 transition shadow-md">Cek Sekarang</button>
            </div>
            <div class="absolute -right-10 -bottom-10 opacity-20 transform -rotate-12">
                <i class="fa-solid fa-bag-shopping text-[180px]"></i>
            </div>
        </div>
    </section>

    <!-- Kategori -->
    <section class="px-6 mb-8 max-w-6xl mx-auto overflow-x-auto whitespace-nowrap no-scrollbar animate__animated animate__fadeInUp">
        <div id="category-list" class="flex space-x-3 py-2">
            <!-- Kategori akan diisi oleh JS -->
        </div>
    </section>

    <!-- Katalog Produk -->
    <main class="px-6 max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold text-gray-800">Katalog Produk</h3>
            <span class="text-sm text-gray-500" id="product-count"></span>
        </div>
        
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-8">
            <!-- Produk akan diisi oleh JS -->
        </div>
    </main>

    <!-- Footer / Informasi Toko -->
    <footer class="mt-16 bg-white p-10 border-t border-gray-100 max-w-6xl mx-auto rounded-t-[40px] shadow-2xl">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 text-center md:text-left">
            <div>
                <h4 class="font-bold text-lg mb-4 text-gray-800">Hubungi Kami</h4>
                <p class="text-sm text-gray-600 mb-2"><i class="fa-solid fa-location-dot mr-2 text-primary"></i> <span id="footer-address"></span></p>
                <p class="text-sm text-gray-600 mb-2"><i class="fa-solid fa-clock mr-2 text-primary"></i> <span id="footer-hours"></span></p>
                <div class="flex justify-center md:justify-start space-x-4 mt-4">
                    <a href="#" class="text-gray-400 hover:text-pink-500"><i class="fa-brands fa-instagram text-2xl"></i></a>
                    <a href="#" class="text-gray-400 hover:text-blue-500"><i class="fa-brands fa-facebook text-2xl"></i></a>
                    <a href="#" class="text-gray-400 hover:text-black"><i class="fa-brands fa-tiktok text-2xl"></i></a>
                </div>
            </div>
            <div class="flex flex-col items-center md:items-end">
                <div class="gradient-bg p-6 rounded-2xl text-white w-full max-w-xs shadow-xl">
                    <p class="text-sm mb-2 opacity-80 font-medium">Butuh bantuan?</p>
                    <a id="wa-footer-btn" href="#" target="_blank" class="flex items-center justify-center space-x-2 bg-green-500 py-3 rounded-xl font-bold hover:bg-green-600 transition shadow-lg">
                        <i class="fa-brands fa-whatsapp text-xl"></i>
                        <span>Chat WhatsApp</span>
                    </a>
                </div>
            </div>
        </div>
        <div class="text-center mt-10 text-gray-400 text-xs">
            <p>&copy; 2024 Yur Collection. All rights reserved.</p>
        </div>
    </footer>

    <!-- Notifikasi Floating Popup -->
    <div id="notification-popup" class="bg-white p-4 rounded-2xl shadow-2xl border border-gray-50 animate__animated animate__fadeInLeft flex items-center space-x-3 max-w-[280px]">
        <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center overflow-hidden">
            <img id="notif-img" src="" alt="user" class="w-full h-full object-cover">
        </div>
        <div>
            <p id="notif-text" class="text-xs text-gray-800 leading-tight"></p>
            <p class="text-[10px] text-gray-400 mt-1">Baru saja</p>
        </div>
    </div>

    <!-- Modal Detail Produk -->
    <div id="product-modal" class="fixed inset-0 bg-black bg-opacity-60 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-[30px] overflow-hidden animate__animated animate__zoomIn relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 z-10 bg-white w-8 h-8 rounded-full shadow-lg flex items-center justify-center">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <div id="modal-content">
                <!-- Diisi via JS -->
            </div>
        </div>
    </div>

    <script>
        const currency = (num) => "Rp " + num.toLocaleString('id-ID');

        // Initializing UI
        function initApp() {
            document.title = SHOP_CONFIG.name;
            document.getElementById('header-shop-name').innerText = SHOP_CONFIG.name;
            document.getElementById('header-logo-text').innerText = SHOP_CONFIG.logoText;
            document.getElementById('footer-address').innerText = SHOP_CONFIG.address;
            document.getElementById('footer-hours').innerText = SHOP_CONFIG.hours;
            document.getElementById('wa-footer-btn').href = `https://wa.me/${SHOP_CONFIG.whatsapp}`;

            renderCategories();
            renderProducts("Semua");
            startNotificationLoop();
        }

        function renderCategories() {
            const container = document.getElementById('category-list');
            SHOP_CONFIG.categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `px-6 py-2 rounded-full text-sm font-semibold transition-all ${cat === "Semua" ? "gradient-bg text-white shadow-lg" : "bg-white text-gray-500 border border-gray-100"}`;
                btn.innerText = cat;
                btn.onclick = (e) => {
                    document.querySelectorAll('#category-list button').forEach(b => {
                        b.className = "px-6 py-2 rounded-full text-sm font-semibold transition-all bg-white text-gray-500 border border-gray-100";
                    });
                    e.target.className = "px-6 py-2 rounded-full text-sm font-semibold transition-all gradient-bg text-white shadow-lg";
                    renderProducts(cat);
                };
                container.appendChild(btn);
            });
        }

        function renderProducts(filter) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = "";
            
            const filtered = filter === "Semua" ? PRODUCTS : PRODUCTS.filter(p => p.category === filter);
            document.getElementById('product-count').innerText = `${filtered.length} Produk`;

            filtered.forEach(p => {
                const discountPercent = Math.round(((p.price - p.discountPrice) / p.price) * 100);
                const html = `
                    <div class="product-card bg-white rounded-3xl overflow-hidden flex flex-col cursor-pointer" onclick="openProduct(${p.id})">
                        <div class="relative h-48 md:h-64 overflow-hidden">
                            <img src="${p.image}" class="w-full h-full object-cover transform transition hover:scale-110 duration-700" alt="${p.name}">
                            ${discountPercent > 0 ? `<div class="absolute top-3 left-3 bg-red-500 text-white text-[10px] font-bold px-2 py-1 rounded-lg">-${discountPercent}%</div>` : ''}
                        </div>
                        <div class="p-4 flex-grow flex flex-col">
                            <h4 class="font-semibold text-gray-800 text-sm md:text-base mb-1 line-clamp-1">${p.name}</h4>
                            <div class="flex items-center text-yellow-400 text-[10px] mb-1">
                                ${Array(5).fill().map(() => '<i class="fa-solid fa-star"></i>').join('')}
                                <span class="text-gray-400 ml-1">(${p.sold}+ terjual)</span>
                            </div>
                            <div class="mt-auto">
                                <p class="text-xs line-through-price">${currency(p.price)}</p>
                                <p class="text-primary-color font-bold text-lg" style="color:#d4a373">${currency(p.discountPrice)}</p>
                            </div>
                            <button class="mt-3 w-full border border-[#d4a373] text-[#d4a373] text-xs font-bold py-2 rounded-xl hover:bg-[#d4a373] hover:text-white transition">Lihat Detail</button>
                        </div>
                    </div>
                `;
                grid.innerHTML += html;
            });
        }

        function openProduct(id) {
            const p = PRODUCTS.find(prod => prod.id === id);
            const content = `
                <div class="md:flex">
                    <div class="md:w-1/2">
                        <img src="${p.image}" class="w-full h-80 object-cover" alt="${p.name}">
                    </div>
                    <div class="md:w-1/2 p-6">
                        <span class="text-[10px] font-bold text-[#d4a373] uppercase tracking-widest">${p.category}</span>
                        <h2 class="text-2xl font-bold text-gray-800 my-2">${p.name}</h2>
                        <div class="flex items-center space-x-2 mb-4">
                            <p class="text-2xl font-bold text-[#d4a373]">${currency(p.discountPrice)}</p>
                            <p class="text-sm line-through text-gray-400">${currency(p.price)}</p>
                        </div>
                        <p class="text-sm text-gray-600 mb-6 leading-relaxed">${p.desc}</p>
                        <div class="bg-gray-50 p-4 rounded-2xl mb-6">
                            <p class="text-xs font-bold text-gray-800 mb-2">⭐ Ulasan Terbaik</p>
                            <p class="text-xs italic text-gray-500">"Suka banget sama bahannya, bener-bener premium sesuai foto. Pengiriman juga cepet banget! Recomended seller."</p>
                        </div>
                        <a href="https://wa.me/${SHOP_CONFIG.whatsapp}?text=Halo ${SHOP_CONFIG.name}, saya ingin memesan ${p.name}" 
                           target="_blank"
                           class="flex items-center justify-center space-x-3 gradient-bg text-white w-full py-4 rounded-2xl font-bold shadow-xl hover:scale-[1.02] transition">
                            <i class="fa-brands fa-whatsapp text-xl"></i>
                            <span>Pesan via WhatsApp</span>
                        </a>
                    </div>
                </div>
            `;
            document.getElementById('modal-content').innerHTML = content;
            document.getElementById('product-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('product-modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Live Notifications Simulation
        const buyers = ["Siska", "Dewi", "Anita", "Rina", "Budi", "Sarah", "Amanda"];
        const actions = ["sedang melihat", "baru saja membeli", "menambahkan ke keranjang"];

        function startNotificationLoop() {
            setInterval(() => {
                const randomBuyer = buyers[Math.floor(Math.random() * buyers.length)];
                const randomAction = actions[Math.floor(Math.random() * actions.length)];
                const randomProduct = PRODUCTS[Math.floor(Math.random() * PRODUCTS.length)];
                
                const notif = document.getElementById('notification-popup');
                const img = document.getElementById('notif-img');
                const text = document.getElementById('notif-text');

                img.src = randomProduct.image;
                text.innerHTML = `<strong>${randomBuyer}</strong> ${randomAction} <br><strong>${randomProduct.name}</strong>`;

                notif.style.display = "flex";
                
                setTimeout(() => {
                    notif.classList.replace('animate__fadeInLeft', 'animate__fadeOutLeft');
                    setTimeout(() => {
                        notif.style.display = "none";
                        notif.classList.replace('animate__fadeOutLeft', 'animate__fadeInLeft');
                    }, 1000);
                }, 5000);

            }, 12000);
        }

        window.onload = initApp;
    </script>
</body>
</html>
